services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    environment:
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/instaswipe?authSource=admin
      S3_USERNAME: ${MINIO_ROOT_USER}
      S3_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:http://host.docker.internal:9000}
      S3_PUBLIC_BUCKET: ${S3_PUBLIC_BUCKET:true}
      SPRING_RABBITMQ_HOST: rabbitmq
      RABBITMQ_ROOT_USERNAME: ${RABBITMQ_ROOT_USERNAME:-guest}
      RABBITMQ_ROOT_PASSWORD: ${RABBITMQ_ROOT_PASSWORD:-guest}
    depends_on:
      - mongodb
      - minio
      - rabbitmq
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio-data:/data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console

  mongodb:
    image: mongo:8.3.4-noble
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ./mongo-data:/data/db
    ports:
      - "27017:27017" # API

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
      - "61613:61613" # STOMP
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_ROOT_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_ROOT_PASSWORD:-guest}
      # Enables the stomp plugin cleanly during boot without overriding the command
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions \"\" -rabbit enabled_plugins_file \"/etc/rabbitmq/enabled_plugins\""
    volumes:
      - ./rabbitmq-data:/var/lib/rabbitmq
