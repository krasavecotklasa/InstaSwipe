<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>InstaSwipe Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #f4f6fb;
    --panel: #ffffff;
    --border: #dde2ee;
    --text: #12151c;
    --dim: #5b6272;
    --accent: #ff3d68;
    --green: #1ea672;
    --yellow: #b7791f;
    --red: #d33d3d;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2vh;
    padding: 4vh 4vw;
  }

  #app-link {
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--accent);
    text-decoration: none;
  }

  #banner {
    width: 100%;
    max-width: 1100px;
    border-radius: 18px;
    padding: 4vh 3vw;
    text-align: center;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 700;
    letter-spacing: 0.02em;
    background: var(--panel);
    border: 2px solid var(--border);
    transition: background 0.4s ease, border-color 0.4s ease;
  }

  #banner.operational { background: #e7f8f1; border-color: var(--green); color: var(--green); }
  #banner.partial_outage { background: #fdf3e0; border-color: var(--yellow); color: var(--yellow); }
  #banner.major_outage,
  #banner.unreachable { background: #fbe9e9; border-color: var(--red); color: var(--red); }

  #components {
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5vw;
  }

  .component {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 3vh 1.5vw;
    text-align: center;
    box-shadow: 0 2px 10px rgba(18, 21, 28, 0.04);
  }

  .dot {
    width: clamp(1.2rem, 3vw, 2rem);
    height: clamp(1.2rem, 3vw, 2rem);
    border-radius: 50%;
    margin: 0 auto 1.2vh;
    background: var(--dim);
  }

  .dot.up { background: var(--green); box-shadow: 0 0 14px 2px rgba(30, 166, 114, 0.5); }
  .dot.down { background: var(--red); box-shadow: 0 0 14px 2px rgba(211, 61, 61, 0.5); }

  .label {
    font-size: clamp(1rem, 2vw, 1.6rem);
    font-weight: 600;
  }

  .value {
    margin-top: 0.5vh;
    font-size: clamp(0.85rem, 1.4vw, 1.1rem);
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  #footer {
    color: var(--dim);
    font-size: clamp(0.8rem, 1.2vw, 1rem);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
</style>
</head>
<body>

<a id="app-link" href="https://instaswipe.app">instaswipe.app</a>

<div id="banner">Connecting&hellip;</div>

<div id="components">
  <div class="component" data-key="api">
    <div class="dot"></div>
    <div class="label">API</div>
    <div class="value">&mdash;</div>
  </div>
  <div class="component" data-key="database">
    <div class="dot"></div>
    <div class="label">Database</div>
    <div class="value">&mdash;</div>
  </div>
  <div class="component" data-key="messaging">
    <div class="dot"></div>
    <div class="label">Real-time messaging</div>
    <div class="value">&mdash;</div>
  </div>
  <div class="component" data-key="media">
    <div class="dot"></div>
    <div class="label">Media storage</div>
    <div class="value">&mdash;</div>
  </div>
</div>

<div id="footer">Updated: never</div>

<script>
  // Override with ?api=http://localhost:8080 for local testing.
  var API_BASE = new URLSearchParams(location.search).get('api') || 'https://api.instaswipe.app';
  var STATUS_URL = API_BASE + '/api/status';
  var POLL_DELAY_MS = 1000;

  var BANNER_TEXT = {
    operational: 'All Systems Operational',
    partial_outage: 'Partial Outage',
    major_outage: 'Major Outage',
    unreachable: 'Unable To Reach Server'
  };

  var banner = document.getElementById('banner');
  var footer = document.getElementById('footer');

  function setComponent(key, state) {
    var el = document.querySelector('.component[data-key="' + key + '"]');
    if (!el) return;
    el.querySelector('.dot').className = 'dot ' + (state === 'up' ? 'up' : 'down');
    el.querySelector('.value').textContent = state === 'up' ? 'Up' : 'Down';
  }

  function render(data) {
    banner.className = data.status;
    banner.textContent = BANNER_TEXT[data.status] || data.status;

    var components = data.components || {};
    ['api', 'database', 'messaging', 'media'].forEach(function (key) {
      setComponent(key, components[key] === 'up' ? 'up' : 'down');
    });

    footer.textContent = 'Updated: ' + new Date().toLocaleTimeString();
  }

  function renderUnreachable() {
    banner.className = 'unreachable';
    banner.textContent = BANNER_TEXT.unreachable;
    ['api', 'database', 'messaging', 'media'].forEach(function (key) {
      setComponent(key, 'down');
    });
    footer.textContent = 'Last attempt: ' + new Date().toLocaleTimeString() + ' (no response)';
  }

  function poll() {
    fetch(STATUS_URL, { cache: 'no-store' })
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(render)
      .catch(renderUnreachable)
      .finally(function () {
        setTimeout(poll, POLL_DELAY_MS);
      });
  }

  poll();
</script>

</body>
</html>
