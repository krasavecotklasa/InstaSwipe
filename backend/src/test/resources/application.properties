# Test-only configuration (committed; application.yaml is gitignored as secrets).
# A throwaway signing secret so the context starts under test; never used in real environments.
app.jwt.secret=test-only-jwt-secret-key-at-least-32-bytes-long-0123456789
spring.data.mongodb.auto-index-creation=true

# Throwaway S3 credentials so the S3 client bean builds under test; never used to reach a real bucket.
# s3.endpoint has a literal default on the s3Client bean itself, but s3Presigner and
# MediaStorageService both reference it as a nested placeholder default (${s3.public-endpoint:${s3.endpoint}})
# with no fallback of their own, so it must be resolvable as a real property here too.
s3.access-key=test
s3.secret-key=test
s3.endpoint=http://localhost:9000
